version: 2

updates:
  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/client'
      - '/server'
      - '/shared-library'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore'
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    groups:
      npm-minor:
        patterns:
          - "*"
        update-types:
          - 'minor'
      npm-patch:
        patterns:
          - "*"
        update-types:
          - 'patch'
